<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Jazz Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0c0a07; --cream:#f2ede3; --gold:#c9a84c; --gold-dim:#7a6330;
  --rust:#b94a2c; --smoke:#1e1b16; --ash:#3a3530; --mist:#7a746a;
  --highlight:#e8d9b0; --green:#4a8a5a; --green-bright:#6abf7a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--ink);color:var(--cream);font-family:'DM Mono',monospace;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 65% 0%,rgba(201,168,76,0.05) 0%,transparent 55%),
             radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.45) 100%);
  pointer-events:none;z-index:999;}
.wrap{max-width:820px;margin:0 auto;padding:0 28px;position:relative;z-index:1;}

header{padding:56px 0 36px;border-bottom:1px solid var(--ash);margin-bottom:44px;}
.eyebrow{font-size:9px;letter-spacing:0.35em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(44px,9vw,78px);font-weight:400;line-height:0.92;letter-spacing:-0.02em;}
h1 em{font-style:italic;color:var(--gold);}
.tagline{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;font-weight:300;color:var(--mist);margin-top:16px;}

.controls{margin-bottom:36px;}
.section-label{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--mist);margin-bottom:10px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
.chip{background:transparent;border:1px solid var(--ash);color:var(--mist);font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.12em;text-transform:uppercase;padding:7px 14px;cursor:pointer;transition:all 0.18s;}
.chip:hover{border-color:var(--gold-dim);color:var(--cream);}
.chip.on{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:500;}

.search-row{display:flex;gap:10px;margin-bottom:12px;}
.search-input{flex:1;background:var(--smoke);border:1px solid var(--ash);color:var(--cream);
  font-family:'DM Mono',monospace;font-size:13px;padding:14px 18px;outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--ash);}
.search-input:focus{border-color:var(--gold-dim);}

.btn-gold{background:var(--gold);border:none;color:var(--ink);font-family:'DM Mono',monospace;
  font-size:10px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;
  padding:14px 22px;cursor:pointer;transition:background 0.18s;white-space:nowrap;}
.btn-gold:hover{background:var(--highlight);}
.btn-gold:disabled{background:var(--ash);cursor:not-allowed;opacity:0.5;}

.action-row{display:flex;gap:10px;flex-wrap:wrap;}
.btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;
  padding:12px 20px;cursor:pointer;transition:all 0.18s;}
.btn-outline:hover{background:var(--smoke);border-color:var(--gold);}
.btn-outline:disabled{opacity:0.35;cursor:not-allowed;}

.status{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mist);
  margin-bottom:28px;min-height:20px;display:flex;align-items:center;gap:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);
  animation:blink 1.2s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

.card{border:1px solid var(--ash);padding:24px 28px;margin-bottom:14px;
  background:rgba(30,27,22,0.5);position:relative;overflow:hidden;
  animation:up 0.35s ease both;transition:border-color 0.2s,background 0.2s;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ash);transition:background 0.2s;}
.card:hover{border-color:var(--gold-dim);background:rgba(30,27,22,0.85);}
.card:hover::before{background:var(--gold);}
.card.real-jazz{border-color:rgba(201,168,76,0.3);}
.card.real-jazz::before{background:var(--gold);}
.card.tribute::before{background:var(--rust);}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.card-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.card-date{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);font-weight:500;}
.card-venue{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--mist);}
.tag{font-size:8px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 7px;border:1px solid;}
.tag.jazz{border-color:var(--gold-dim);color:var(--gold);}
.tag.tribute{border-color:var(--rust);color:var(--rust);}
.tag.all-ages{border-color:var(--green);color:var(--green-bright);}
.tag.adults{border-color:var(--ash);color:var(--mist);}
.card-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.card-desc{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;font-weight:300;color:var(--mist);line-height:1.55;}
.card-footer{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap;}
.card-stat{font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ash);}
.card-stat span{color:var(--cream);}

.digest-head{font-family:'Playfair Display',serif;font-size:30px;font-style:italic;font-weight:400;color:var(--gold);margin-bottom:6px;}
.digest-sub{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--mist);
  padding-bottom:22px;border-bottom:1px solid var(--ash);margin-bottom:30px;}
.digest-day{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--gold-dim);
  margin:30px 0 14px;display:flex;align-items:center;gap:14px;}
.digest-day::after{content:'';flex:1;height:1px;background:var(--ash);}

.empty{text-align:center;padding:70px 0;}
.empty-glyph{font-family:'Playfair Display',serif;font-size:60px;color:var(--ash);font-style:italic;margin-bottom:14px;}
.empty-msg{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--mist);}
.error-box{border:1px solid var(--rust);padding:14px 18px;color:var(--rust);font-size:11px;margin-bottom:20px;line-height:1.7;}

footer{padding:28px 0 48px;border-top:1px solid var(--ash);margin-top:60px;}
.footer-txt{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ash);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Los Angeles &middot; Jazz &middot; 91214 &amp; Beyond</div>
    <h1>LA <em>Jazz</em><br>Finder</h1>
    <p class="tagline">All-ages. Real jazz. No wasted Tuesdays.</p>
  </header>

  <div class="controls">
    <div class="section-label">Filter by night</div>
    <div class="chips" id="dayChips">
      <button class="chip on" data-day="Tuesday">Tue</button>
      <button class="chip on" data-day="Wednesday">Wed</button>
      <button class="chip on" data-day="Thursday">Thu</button>
      <button class="chip on" data-day="Friday">Fri</button>
      <button class="chip on" data-day="Saturday">Sat</button>
      <button class="chip" data-day="Sunday">Sun</button>
      <button class="chip" data-day="Monday">Mon</button>
    </div>

    <div class="section-label">Search for a show or artist</div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text"
        placeholder="e.g. latin jazz, big band, this weekend&hellip;"
        onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="btn-gold" id="searchBtn" onclick="doSearch()">Search</button>
    </div>

    <div class="action-row">
      <button class="btn-outline" id="digestBtn" onclick="doDigest()">&#9651;&nbsp; Weekly Digest</button>
      <button class="btn-outline" id="tuesdayBtn" onclick="doTuesdayCheck()">&#9651;&nbsp; What's On Tuesday</button>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>

  <footer>
    <div class="footer-txt">Powered by Claude AI &middot; LAjazz.com &middot; Vibrato &middot; Catalina &middot; Blue Note LA &middot; JazzNearYou &middot; Base: 91214</div>
  </footer>
</div>

<script>
// ── Day chips
document.querySelectorAll('.chip[data-day]').forEach(c =>
  c.addEventListener('click', () => c.classList.toggle('on'))
);
function activeDays() {
  return [...document.querySelectorAll('.chip.on[data-day]')].map(c => c.dataset.day);
}
function setStatus(msg, loading) {
  document.getElementById('status').innerHTML = loading
    ? `<span class="dot"></span>${msg}` : msg;
}
function setBusy(b) {
  ['searchBtn','digestBtn','tuesdayBtn'].forEach(id =>
    document.getElementById(id).disabled = b);
}

function makeCard(s, i) {
  const jTag = s.isRealJazz
    ? `<span class="tag jazz">Jazz</span>`
    : `<span class="tag tribute">Tribute / Pop</span>`;
  const aTag = s.allAges
    ? `<span class="tag all-ages">All Ages</span>`
    : `<span class="tag adults">21+</span>`;
  const cls = s.isRealJazz ? 'real-jazz' : (s.isTribute ? 'tribute' : '');
  return `<div class="card ${cls}" style="animation-delay:${i*0.06}s">
    <div class="card-meta">
      <span class="card-date">${s.date||''}</span>
      <span class="card-venue">${s.venue||''}</span>
      ${jTag}${aTag}
    </div>
    <div class="card-title">${s.title||''}</div>
    <div class="card-desc">${s.description||''}</div>
    <div class="card-footer">
      ${s.time?`<span class="card-stat">Time <span>${s.time}</span></span>`:''}
      ${s.distance?`<span class="card-stat">From 91214 <span>~${s.distance}</span></span>`:''}
      ${s.cover?`<span class="card-stat">Cover <span>${s.cover}</span></span>`:''}
    </div>
  </div>`;
}

function renderShows(shows, title) {
  const r = document.getElementById('results');
  if (!shows?.length) {
    r.innerHTML = `<div class="empty"><div class="empty-glyph">&#9833;</div>
      <div class="empty-msg">No shows found matching your filters.<br>Try broadening your search or toggling more nights.</div></div>`;
    return;
  }
  let h = title ? `<div class="digest-day">${title}</div>` : '';
  shows.forEach((s, i) => h += makeCard(s, i));
  r.innerHTML = h;
}

function renderDigest(shows, dateRange) {
  const r = document.getElementById('results');
  const map = {}, order = [];
  (shows||[]).forEach(s => {
    const k = s.date || 'Unknown Date';
    if (!map[k]) { map[k] = []; order.push(k); }
    map[k].push(s);
  });
  let h = `<div class="digest-head">This Week in LA Jazz</div>
    <div class="digest-sub">${dateRange||'Next 7 days'} &middot; All-ages priority &middot; Near 91214</div>`;
  if (!order.length) {
    h += `<div class="empty"><div class="empty-glyph">&#9833;</div>
      <div class="empty-msg">Nothing confirmed this week. Check back soon.</div></div>`;
  } else {
    order.forEach(day => {
      h += `<div class="digest-day">${day}</div>`;
      map[day].forEach((s, i) => h += makeCard(s, i));
    });
  }
  r.innerHTML = h;
}

// ── API call — hits YOUR Vercel backend
async function callAPI(prompt) {
  const res = await fetch('/api/jazz', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  const days = activeDays();
  setBusy(true);
  setStatus('Searching LA jazz sources…', true);
  document.getElementById('results').innerHTML = '';
  const daysStr = days.length ? days.join(', ') : 'any night';
  const prompt = `Find live jazz shows in Los Angeles${q?` matching "${q}"`:''}. Preferred nights: ${daysStr}. Today is ${new Date().toDateString()}. Look 10 days ahead. Prioritize all-ages venues near zip 91214. Return JSON.`;
  try {
    const data = await callAPI(prompt);
    let shows = data.shows || [];
    if (days.length && days.length < 7) {
      const abbrs = days.map(d => d.slice(0,3).toLowerCase());
      shows = shows.filter(s => abbrs.some(a => (s.date||'').toLowerCase().includes(a)));
    }
    setStatus(`${shows.length} show${shows.length!==1?'s':''} found`);
    renderShows(shows);
  } catch(e) {
    setStatus('');
    document.getElementById('results').innerHTML =
      `<div class="error-box">Search failed — ${e.message}</div>`;
  }
  setBusy(false);
}

async function doDigest() {
  setBusy(true);
  setStatus('Building your weekly jazz digest…', true);
  document.getElementById('results').innerHTML = '';
  const days = activeDays();
  const daysStr = days.length ? days.join(', ') : 'Tuesday through Saturday';
  const prompt = `Build a weekly LA jazz digest for the next 7 days starting ${new Date().toDateString()}. Focus on nights: ${daysStr}. Prioritize all-ages venues near zip 91214. Search all major LA jazz venues. Include as many confirmed shows as possible. Return JSON.`;
  try {
    const data = await callAPI(prompt);
    setStatus(`Digest ready &middot; ${(data.shows||[]).length} shows found`);
    renderDigest(data.shows, data.dateRange);
  } catch(e) {
    setStatus('');
    document.getElementById('results').innerHTML =
      `<div class="error-box">Could not build digest — ${e.message}</div>`;
  }
  setBusy(false);
}

async function doTuesdayCheck() {
  setBusy(true);
  setStatus('Checking this Tuesday…', true);
  document.getElementById('results').innerHTML = '';
  const today = new Date();
  const diff = (2 - today.getDay() + 7) % 7 || 7;
  const tue = new Date(today);
  tue.setDate(today.getDate() + diff);
  const tueStr = tue.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const prompt = `What live jazz shows are happening in Los Angeles on ${tueStr}? Today is ${today.toDateString()}. Prioritize all-ages venues near zip 91214. Search Vibrato, Catalina, Blue Note LA, LAjazz.com, jazznearyou.com. Return JSON.`;
  try {
    const data = await callAPI(prompt);
    const shows = data.shows || [];
    setStatus(`${shows.length} show${shows.length!==1?'s':''} on ${tueStr}`);
    renderShows(shows, tueStr);
  } catch(e) {
    setStatus('');
    document.getElementById('results').innerHTML =
      `<div class="error-box">Could not load Tuesday's shows — ${e.message}</div>`;
  }
  setBusy(false);
}
</script>
</body>
</html>
